<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logout - MedConnect</title>
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-container">
  <div class="login-box">
    <h1>MedConnect</h1>
    <p class="login-subtitle">Are you sure you want to log out?</p>

    <div class="logout-buttons">
      <button class="logout-btn" onclick="logout()">Logout</button>
      <button class="cancel-btn" onclick="goBack()">Stay Logged In</button>
    </div>
  </div>
</div>

<script>
  function logout() {
    localStorage.removeItem("loggedInUser");
    localStorage.removeItem("loggedInRole");
    window.location.href = "index.html";
  }

  function goBack() {
    window.location.href = "index.html";
  }
</script>

</body>
</html>
